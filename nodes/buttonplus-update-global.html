<script type="text/javascript" src="resources/node-red-contrib-buttonplus/buttonplus-editor.js"></script>
<script type="text/javascript">
    RED.nodes.registerType('buttonplus-update-global', {
        category: 'buttonplus',
        color: '#DDAA99',
        defaults: {
            name: { value: '' },
            config: { value: '', type: 'buttonplus-config', required: true },
            page: { value: '', validate: RED.validators.number() },
            brightness: { value: '', validate: RED.validators.number() },
            outputProperties: { value: [] }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-sliders',
        label: function () {
            return this.name || 'Button+ update global';
        },
        paletteLabel: 'Button+ update global',
        oneditprepare: function () {
            bpPrepareActionOutputProperties(this);
        },
        oneditsave: function () {
            bpSaveOutputProperties(this);
        },
        oneditresize: bpResizeOutputProperties
    });
</script>

<script type="text/html" data-template-name="buttonplus-update-global">
    <div class="form-row">
        <label for="node-input-name">Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-config">Config</label>
        <input type="text" id="node-input-config">
    </div>
    <div class="form-row">
        <label for="node-input-page">Page</label>
        <input type="number" id="node-input-page" min="1">
    </div>
    <div class="form-row">
        <label for="node-input-brightness">Brightness</label>
        <input type="number" id="node-input-brightness" min="0" max="100">
    </div>
    <div class="form-row node-input-output-properties-container-row">
        <label>Output properties</label>
        <ol id="node-input-output-properties-container"></ol>
    </div>
</script>

<script type="text/html" data-help-name="buttonplus-update-global">
    <p>Updates global Button+ settings such as active page and display brightness.</p>
    <p>Each field can be published independently. Empty node configuration values are left unchanged unless overridden in <code>msg</code>.</p>
    <h3>Output properties</h3>
    <p>Add output mappings to extend the outgoing message. With an empty list the input message is passed through unchanged.</p>
    <p>Available source:</p>
    <dl class="message-properties">
        <dt>buttonplus_debug <span class="property-type">object</span></dt>
        <dd>Debug info with the incoming message in <code>input</code> and all MQTT messages sent in <code>mqtt</code>.</dd>
    </dl>
    <h3>Override precedence</h3>
    <p><code>msg</code> property &gt; node configuration. Device id comes from the linked Button+ config node.</p>
    <h3>Input message properties</h3>
    <dl class="message-properties">
        <dt>page <span class="property-type">number</span></dt>
        <dd>Active page number. Published to <code>page/set</code>.</dd>
        <dt>brightness <span class="property-type">number</span></dt>
        <dd>Global display brightness from 0 to 100. Published only when set.</dd>
    </dl>
    <h3>MQTT topics</h3>
    <p>Published to:</p>
    <ul>
        <li><code>{prefix}/{device}/page/set</code></li>
        <li><code>{prefix}/{device}/brightness/set</code></li>
    </ul>
</script>
